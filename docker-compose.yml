services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    command: >
      sh -c "pnpm install &&
      pnpm dev --hostname 0.0.0.0 --port 3000"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      PNPM_STORE_DIR: /pnpm/store
      DATABASE_URL: postgresql://postgres:postgres@db:5432/mvp_template?schema=public
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_pnpm_store:/pnpm/store
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:18-bookworm
    environment:
      POSTGRES_DB: mvp_template
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mvp_template"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  app_node_modules:
  app_pnpm_store:
  postgres_data:
